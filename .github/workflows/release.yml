name: Release

# On a version tag, build every platform bundle and attach them to the GitHub Release:
#   - macOS: a single UNIVERSAL .dmg/.app (Intel + Apple Silicon)
#   - Linux: .deb + .AppImage
# The release body is taken from the matching CHANGELOG.md section. Unsigned (alpha).
on:
  push:
    tags: ['v*']

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: macos-14
            rust-targets: aarch64-apple-darwin,x86_64-apple-darwin
            args: --target universal-apple-darwin
          - platform: ubuntu-22.04
            rust-targets: ''
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4

      - name: Linux system deps (webkit2gtk + bundling)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev libgtk-3-dev librsvg2-dev patchelf \
            libayatana-appindicator3-dev

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-targets }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Install JS deps + build the vendored xterm bundle
        # renderer/xterm-bundle.js is gitignored, so the checkout doesn't have it —
        # regenerate it before Tauri bundles the renderer, or the app ships broken.
        run: |
          npm ci
          npm run build:xterm

      - name: Extract this tag's CHANGELOG section as the release body
        id: notes
        run: |
          VER="${GITHUB_REF_NAME#v}"
          awk -v v="$VER" '/^## \[/{on = ($0 ~ ("\\[" v "\\]")); next} on' CHANGELOG.md > RELEASE_NOTES.md
          {
            echo 'body<<AO_EOF'
            cat RELEASE_NOTES.md
            echo 'AO_EOF'
          } >> "$GITHUB_OUTPUT"

      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: ${{ github.ref_name }}
          releaseBody: ${{ steps.notes.outputs.body }}
          releaseDraft: false
          # semver pre-releases carry a hyphen (e.g. v0.3.0-alpha) → mark as prerelease.
          prerelease: ${{ contains(github.ref_name, '-') }}
          args: ${{ matrix.args }}
